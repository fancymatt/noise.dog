<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <!-- noise.dog Hero Mark — redrawn to match the canonical favicon glyph -->
  <!-- Braun-influenced geometric grammar: rounded stubs, thick weights, blocky legs -->
  <rect width="1000" height="1000" fill="#F5F2EB"/>

  <!-- Head block -->
  <rect x="330" y="230" width="340" height="250" rx="60" ry="60" fill="#1C1917"/>

  <!-- Ears -->
  <rect x="330" y="160" width="110" height="140" rx="25" ry="25" fill="#1C1917"/>
  <rect x="560" y="160" width="110" height="140" rx="25" ry="25" fill="#1C1917"/>

  <!-- Snout -->
  <rect x="560" y="380" width="160" height="100" rx="35" ry="35" fill="#1C1917"/>

  <!-- Body -->
  <rect x="250" y="450" width="500" height="260" rx="70" ry="70" fill="#1C1917"/>

  <!-- Four-leg structure — redrawn with distinct legs but matching favicon weight -->
  <!-- Front pair -->
  <rect x="265" y="680" width="75" height="170" rx="35" ry="35" fill="#1C1917"/>
  <rect x="360" y="680" width="75" height="170" rx="35" ry="35" fill="#1C1917"/>

  <!-- Rear pair -->
  <rect x="565" y="680" width="75" height="170" rx="35" ry="35" fill="#1C1917"/>
  <rect x="660" y="680" width="75" height="170" rx="35" ry="35" fill="#1C1917"/>

  <!-- Tail — simple bold arc -->
  <path d="M750,480 Q850,380 820,280" stroke="#1C1917" stroke-width="80" fill="none" stroke-linecap="round"/>

  <!-- Subtle refinement for Hero scale: Eye highlight (matching BIRD-31 primary) -->
  <circle cx="450" cy="330" r="28" fill="#F5F2EB"/>
  <circle cx="458" cy="322" r="10" fill="#1C1917"/>
</svg>
