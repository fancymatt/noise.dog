<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>noise.dog</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <style>
    /* ─── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; }
    body { line-height: 1.5; -webkit-font-smoothing: antialiased; }
    img, picture, video, canvas, svg { display: block; max-width: 100%; }
    input, button, textarea, select { font: inherit; }
    p, h1, h2, h3, h4, h5, h6 { overflow-wrap: break-word; }

    /* ─── Tokens ─────────────────────────────────────────────── */
    :root {
      --color-bg:               #1c1917;
      --color-surface:          #292421;
      --color-text-primary:     #e8e0d8;
      --color-text-secondary:   #9c8f84;
      --color-accent:           #c8a96e;
      --color-preset-active-text:   #1c1917;
      --color-preset-inactive-text: #9c8f84;
      --glow-color:             200, 169, 110;
      --vol-pct:                50%;
    }

    /* ─── Base ───────────────────────────────────────────────── */
    html, body {
      height: 100%;
      background-color: var(--color-bg);
      color: var(--color-text-primary);
      font-family: 'Inter', sans-serif;
    }

    /* ─── Screen reader utility ──────────────────────────────── */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border-width: 0;
    }

    /* ─── Focus styles ───────────────────────────────────────── */
    :focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 3px;
      border-radius: 4px;
    }
    .preset-btn:focus-visible {
      outline-offset: 2px;
      border-radius: 20px;
    }
    .play-btn:focus-visible {
      border-radius: 50%;
    }

    /* ─── Background glow ────────────────────────────────────── */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 1.5s ease;
    }
    .bg-glow-layer {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse at center,
        rgba(var(--glow-color), 1) 0%,
        transparent 70%
      );
      opacity: 0;
      transition: opacity 800ms ease;
    }
    .bg-glow.playing {
      animation: breathe 10s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.06; }
      50%       { opacity: 0.09; }
    }

    /* ─── Layout ─────────────────────────────────────────────── */
    .layout {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: max(20px, env(safe-area-inset-top));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      padding-left: 24px;
      padding-right: 24px;
    }

    /* ─── Brand ──────────────────────────────────────────────── */
    .brand {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 400;
      color: var(--color-text-secondary);
      letter-spacing: 0.01em;
      flex-shrink: 0;
    }
    .brand-mark {
      height: 28px;
      width: auto;
      flex-shrink: 0;
    }

    /* ─── Spacers ────────────────────────────────────────────── */
    .spacer { flex: 1; }
    .spacer-sm { height: 20px; flex-shrink: 0; }
    .spacer-md { height: 32px; flex-shrink: 0; }
    .spacer-lg { height: 48px; flex-shrink: 0; }

    /* ─── Preset name ────────────────────────────────────────── */
    .preset-name {
      font-size: 30px;
      font-weight: 300;
      color: var(--color-text-secondary);
      text-align: center;
      line-height: 1.2;
      transition: color 600ms ease;
    }
    .preset-name.playing {
      color: var(--color-text-primary);
    }

    /* ─── Preset selector ────────────────────────────────────── */
    .preset-selector {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .preset-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      background: transparent;
      color: var(--color-preset-inactive-text);
      font-size: 12px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 150ms ease, color 150ms ease, transform 120ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    .preset-btn:hover {
      background: rgba(200, 169, 110, 0.08);
      color: var(--color-text-primary);
    }
    .preset-btn.active {
      background: var(--color-accent);
      color: var(--color-preset-active-text);
    }
    .preset-btn:active {
      transform: scale(0.96);
    }

    /* ─── Play button ────────────────────────────────────────── */
    .play-btn {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 1.5px solid var(--color-text-primary);
      background: transparent;
      color: var(--color-text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 160ms cubic-bezier(0.34, 1.56, 0.64, 1);
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .play-btn:active {
      transform: scale(0.94);
    }
    .play-btn svg {
      width: 32px;
      height: 32px;
    }
    .icon-play, .icon-pause {
      transition: opacity 140ms ease-out;
    }

    /* ─── Volume slider ──────────────────────────────────────── */
    .volume-label {
      display: block;
      width: calc(100% - 48px);
    }

    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 44px; /* tall for touch target */
      background: transparent;
      cursor: pointer;
      padding: 0;
      margin: 0;
    }

    /* Track */
    .volume-slider::-webkit-slider-runnable-track {
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(
        to right,
        var(--color-accent) 0%,
        var(--color-accent) var(--vol-pct),
        #2a2420 var(--vol-pct),
        #2a2420 100%
      );
    }
    .volume-slider::-moz-range-track {
      height: 3px;
      border-radius: 2px;
      background: #2a2420;
    }
    .volume-slider::-moz-range-progress {
      height: 3px;
      border-radius: 2px;
      background: var(--color-accent);
    }

    /* Thumb */
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--color-text-primary);
      margin-top: -6.5px;
      transition: transform 100ms ease;
    }
    .volume-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: none;
      background: var(--color-text-primary);
      transition: transform 100ms ease;
    }
    .volume-slider:active::-webkit-slider-thumb {
      transform: scale(1.2);
    }
    .volume-slider:active::-moz-range-thumb {
      transform: scale(1.2);
    }

    /* ─── Desktop ────────────────────────────────────────────── */
    @media (min-width: 900px) {
      .layout {
        max-width: 480px;
        margin: 0 auto;
      }
      .brand {
        justify-content: flex-start;
      }
      .play-btn {
        width: 120px;
        height: 120px;
      }
      .play-btn svg {
        width: 40px;
        height: 40px;
      }
      .volume-label {
        width: 320px;
      }
    }
  </style>
</head>
<body>

  <div class="bg-glow" id="bgGlow" aria-hidden="true">
    <div class="bg-glow-layer" id="bgGlowA"></div>
    <div class="bg-glow-layer" id="bgGlowB"></div>
  </div>

  <div class="layout">
    <header class="brand" aria-label="noise.dog">
      <svg class="brand-mark" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g fill="currentColor">
          <rect x="330" y="230" width="340" height="250" rx="60" ry="60"/>
          <rect x="330" y="160" width="110" height="140" rx="25" ry="25"/>
          <rect x="560" y="160" width="110" height="140" rx="25" ry="25"/>
          <rect x="560" y="380" width="160" height="100" rx="35" ry="35"/>
          <rect x="250" y="450" width="500" height="260" rx="70" ry="70"/>
          <rect x="265" y="680" width="75" height="170" rx="35" ry="35"/>
          <rect x="360" y="680" width="75" height="170" rx="35" ry="35"/>
          <rect x="565" y="680" width="75" height="170" rx="35" ry="35"/>
          <rect x="660" y="680" width="75" height="170" rx="35" ry="35"/>
        </g>
        <path d="M750,480 Q850,380 820,280" stroke="currentColor" stroke-width="80" fill="none" stroke-linecap="round"/>
      </svg>
      <span>noise.dog</span>
    </header>

    <div class="spacer"></div>

    <p class="preset-name" id="presetName" aria-live="polite">Deep Focus</p>
    <div class="spacer-sm"></div>
    <div class="preset-selector" role="group" aria-label="Sound presets" id="presetSelector"></div>

    <div class="spacer"></div>

    <button
      class="play-btn"
      id="playBtn"
      aria-label="Play"
      aria-pressed="false"
      type="button"
    >
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g class="icon-play" id="iconPlay">
          <polygon points="11,6 27,16 11,26" fill="currentColor"/>
        </g>
        <g class="icon-pause" id="iconPause" style="display:none; opacity:0">
          <rect x="7" y="6" width="5" height="20" rx="1" fill="currentColor"/>
          <rect x="20" y="6" width="5" height="20" rx="1" fill="currentColor"/>
        </g>
      </svg>
    </button>

    <div class="spacer-lg"></div>

    <label class="volume-label" for="volume">
      <span class="sr-only">Volume</span>
      <input
        type="range"
        id="volume"
        class="volume-slider"
        min="0"
        max="100"
        value="50"
        aria-label="Volume"
      >
    </label>

    <div class="spacer"></div>
  </div>

  <script>
    // ─── Presets ──────────────────────────────────────────────
    const PRESETS = [
      {
        name: "Deep Focus",
        slug: "deep-focus",
        glowColor: "200, 169, 110",
        layers: [
          { source: "brown", filters: [{ type: "lowpass", freq: 800, Q: 0.7 }], gain: 0.8, pan: 0 },
          { source: "brown", filters: [{ type: "bandpass", freq: 250, Q: 0.5 }], gain: 0.3, pan: 0 },
        ],
      },
      {
        name: "Midnight Rain",
        slug: "midnight-rain",
        glowColor: "110, 130, 155",
        layers: [
          { source: "brown", filters: [{ type: "lowpass", freq: 200, Q: 0.8 }], gain: 0.6, pan: 0 },
          { source: "white", filters: [{ type: "bandpass", freq: 6000, Q: 1.2 }, { type: "highpass", freq: 3000, Q: 0.5 }], gain: 0.15, pan: 0 },
          { source: "white", filters: [{ type: "bandpass", freq: 4000, Q: 0.8 }], gain: 0.08, pan: -0.4 },
          { source: "white", filters: [{ type: "bandpass", freq: 5000, Q: 0.8 }], gain: 0.08, pan: 0.4 },
        ],
      },
      {
        name: "Embers",
        slug: "embers",
        glowColor: "210, 135, 75",
        layers: [
          { source: "brown", filters: [{ type: "lowpass", freq: 400, Q: 0.6 }], gain: 0.7, pan: 0 },
          { source: "white", filters: [{ type: "bandpass", freq: 3000, Q: 2.0 }, { type: "highpass", freq: 1500, Q: 0.5 }], gain: 0.06, pan: 0.1 },
          { source: "brown", filters: [{ type: "lowpass", freq: 120, Q: 1.0 }], gain: 0.4, pan: 0 },
        ],
      },
      {
        name: "Coastal Wind",
        slug: "coastal-wind",
        glowColor: "130, 160, 150",
        layers: [
          { source: "brown", filters: [{ type: "lowpass", freq: 600, Q: 0.5 }], gain: 0.5, pan: 0 },
          { source: "white", filters: [{ type: "lowshelf", freq: 1000, gain: -6 }, { type: "bandpass", freq: 1200, Q: 0.4 }], gain: 0.25, pan: 0 },
          { source: "white", filters: [{ type: "highpass", freq: 2500, Q: 0.3 }, { type: "lowpass", freq: 8000, Q: 0.5 }], gain: 0.1, pan: 0 },
          { source: "white", filters: [{ type: "bandpass", freq: 1800, Q: 0.6 }], gain: 0.05, pan: -0.6 },
          { source: "white", filters: [{ type: "bandpass", freq: 2200, Q: 0.6 }], gain: 0.05, pan: 0.6 },
        ],
      },
      {
        name: "Drift",
        slug: "drift",
        glowColor: "160, 155, 180",
        layers: [
          { source: "brown", filters: [{ type: "lowpass", freq: 300, Q: 0.8 }], gain: 0.7, pan: 0 },
          { source: "brown", filters: [{ type: "bandpass", freq: 500, Q: 0.3 }], gain: 0.2, pan: 0 },
          { source: "white", filters: [{ type: "bandpass", freq: 7000, Q: 1.5 }], gain: 0.03, pan: 0 },
          { source: "brown", filters: [{ type: "lowpass", freq: 400, Q: 0.5 }], gain: 0.1, pan: -0.3 },
          { source: "brown", filters: [{ type: "lowpass", freq: 400, Q: 0.5 }], gain: 0.1, pan: 0.3 },
        ],
      },
    ];

    let currentPresetIndex = 0;
    let isPlaying = false;
    let ctx, masterGain;
    let activeLayers = [];
    let noiseBuffers;
    let presetSwapTimer = null;
    let targetVolume = 0.5;

    // ─── Audio engine ─────────────────────────────────────────
    function createAudioContext() {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain();
      masterGain.gain.value = targetVolume;
      masterGain.connect(ctx.destination);
      initBuffers();
    }

    function whiteNoise() {
      const bufferSize = 2 * ctx.sampleRate;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      return buffer;
    }

    function brownNoise() {
      const bufferSize = 2 * ctx.sampleRate;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      let last = 0;
      for (let i = 0; i < bufferSize; i++) {
        const white = Math.random() * 2 - 1;
        data[i] = (last + 0.02 * white) / 1.02;
        last = data[i];
        data[i] *= 3.5;
      }
      return buffer;
    }

    function initBuffers() {
      noiseBuffers = {
        white: whiteNoise(),
        brown: brownNoise(),
      };
    }

    function createLayer(layerDef) {
      const source = ctx.createBufferSource();
      source.buffer = noiseBuffers[layerDef.source];
      source.loop = true;

      let output = source;
      const filters = layerDef.filters.map((filterDef) => {
        const filter = ctx.createBiquadFilter();
        filter.type = filterDef.type;
        filter.frequency.value = filterDef.freq;
        if (typeof filterDef.Q === 'number') filter.Q.value = filterDef.Q;
        if (typeof filterDef.gain === 'number') filter.gain.value = filterDef.gain;
        output.connect(filter);
        output = filter;
        return filter;
      });

      const gain = ctx.createGain();
      gain.gain.value = layerDef.gain;
      output.connect(gain);

      const pan = ctx.createStereoPanner();
      pan.pan.value = layerDef.pan;
      gain.connect(pan);
      pan.connect(masterGain);

      return { source, filters, gain, pan };
    }

    function startPreset(resetGain = true) {
      if (!ctx) createAudioContext();
      stopPreset();
      if (resetGain) {
        masterGain.gain.cancelScheduledValues(ctx.currentTime);
        masterGain.gain.setValueAtTime(targetVolume, ctx.currentTime);
      }
      const preset = PRESETS[currentPresetIndex];
      activeLayers = preset.layers.map(createLayer);
      activeLayers.forEach((layer) => layer.source.start());
    }

    function startPresetCrossfade() {
      if (!ctx) {
        startPreset();
        return;
      }

      const now = ctx.currentTime;
      const FADE = 0.15; // 150ms ramp down/up
      const currentVolume = masterGain.gain.value;

      if (presetSwapTimer) {
        clearTimeout(presetSwapTimer);
        presetSwapTimer = null;
      }

      masterGain.gain.cancelScheduledValues(now);
      masterGain.gain.setValueAtTime(currentVolume, now);
      masterGain.gain.linearRampToValueAtTime(0, now + FADE);

      presetSwapTimer = setTimeout(() => {
        stopPreset();
        startPreset(false);

        const t = ctx.currentTime;
        masterGain.gain.cancelScheduledValues(t);
        masterGain.gain.setValueAtTime(0, t);
        masterGain.gain.linearRampToValueAtTime(targetVolume || currentVolume, t + FADE);
        presetSwapTimer = null;
      }, FADE * 1000);
    }

    function stopPreset() {
      if (presetSwapTimer) {
        clearTimeout(presetSwapTimer);
        presetSwapTimer = null;
      }

      activeLayers.forEach((layer) => {
        try {
          layer.source.stop();
        } catch (error) {
          // Sources can only stop once; ignore stale stop attempts during swaps.
        }

        layer.source.disconnect();
        layer.filters.forEach((filter) => filter.disconnect());
        layer.gain.disconnect();
        layer.pan.disconnect();
      });
      activeLayers = [];
    }

    // ─── Glow system ──────────────────────────────────────────
    // Two-layer crossfade: layerA and layerB alternate as active/incoming.
    // The parent .bg-glow controls overall opacity (play/pause, breathing anim).
    const bgGlow  = document.getElementById('bgGlow');
    const glowLayerA = document.getElementById('bgGlowA');
    const glowLayerB = document.getElementById('bgGlowB');
    let activeGlowLayer = glowLayerA; // starts as active

    function glowGradient(color) {
      return `radial-gradient(ellipse at center, rgba(${color}, 1) 0%, transparent 70%)`;
    }

    function showGlow() {
      const preset = PRESETS[currentPresetIndex];
      activeGlowLayer.style.background = glowGradient(preset.glowColor);
      activeGlowLayer.style.opacity = '1';
      // Fade parent in over 2.5s, then breathing animation takes over
      bgGlow.style.transition = 'opacity 2.5s ease';
      bgGlow.style.opacity = '1';
      bgGlow.classList.add('playing');
    }

    function hideGlow() {
      // Freeze the current computed opacity before removing the animation class.
      // Without this, some browsers (Firefox) snap the element to its base opacity
      // when the animation is removed, causing a visible flash before the fade-out.
      const currentOpacity = getComputedStyle(bgGlow).opacity;
      bgGlow.style.opacity = currentOpacity;
      bgGlow.classList.remove('playing');
      bgGlow.style.transition = 'opacity 1.5s ease';
      bgGlow.style.opacity = '0';
    }

    function updateGlowColor(glowColor) {
      // 800ms crossfade: fade in the inactive layer with new color, fade out active
      const incomingLayer = activeGlowLayer === glowLayerA ? glowLayerB : glowLayerA;
      incomingLayer.style.background = glowGradient(glowColor);
      incomingLayer.style.opacity = '1';       // fade in (800ms via CSS transition)
      activeGlowLayer.style.opacity = '0';     // fade out (800ms via CSS transition)
      activeGlowLayer = incomingLayer;
    }

    // ─── Play icon morph ──────────────────────────────────────
    const iconPlay  = document.getElementById('iconPlay');
    const iconPause = document.getElementById('iconPause');

    function updatePlayIcon(playing) {
      // Total morph: 140ms exit fade + 140ms enter fade ≈ 280ms spec
      if (playing) {
        iconPlay.style.opacity = '0';
        setTimeout(() => {
          iconPlay.style.display = 'none';
          iconPause.style.display = 'block';
          iconPause.style.opacity = '0';
          requestAnimationFrame(() => { iconPause.style.opacity = '1'; });
        }, 140);
      } else {
        iconPause.style.opacity = '0';
        setTimeout(() => {
          iconPause.style.display = 'none';
          iconPlay.style.display = 'block';
          iconPlay.style.opacity = '0';
          requestAnimationFrame(() => { iconPlay.style.opacity = '1'; });
        }, 140);
      }
    }

    // ─── Toggle play ──────────────────────────────────────────
    const playBtn    = document.getElementById('playBtn');
    const presetNameEl = document.getElementById('presetName');

    function togglePlay() {
      isPlaying = !isPlaying;
      playBtn.setAttribute('aria-pressed', String(isPlaying));
      playBtn.setAttribute('aria-label', isPlaying ? 'Pause' : 'Play');
      updatePlayIcon(isPlaying);

      if (isPlaying) {
        if (ctx?.state === 'suspended') ctx.resume();
        startPreset();
        showGlow();
        presetNameEl.classList.add('playing');
      } else {
        stopPreset();
        hideGlow();
        presetNameEl.classList.remove('playing');
      }
    }

    // ─── Preset name transition ───────────────────────────────
    function transitionPresetName(newName) {
      presetNameEl.style.transition = 'opacity 200ms ease, transform 200ms ease';
      presetNameEl.style.opacity = '0';
      presetNameEl.style.transform = 'translateY(-4px)';

      setTimeout(() => {
        presetNameEl.textContent = newName;
        presetNameEl.style.transform = 'translateY(4px)';
        requestAnimationFrame(() => {
          presetNameEl.style.opacity = '1';
          presetNameEl.style.transform = 'translateY(0)';
        });
      }, 100);
    }

    // ─── Select preset ────────────────────────────────────────
    function selectPreset(index, skipUrlUpdate) {
      if (index === currentPresetIndex) return;

      const prev = currentPresetIndex;
      currentPresetIndex = index;
      const preset = PRESETS[index];

      // Update capsules
      const buttons = document.querySelectorAll('.preset-btn');
      buttons.forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
        btn.setAttribute('aria-pressed', String(i === index));
      });

      // Update preset name with transition
      transitionPresetName(preset.name);

      // Update glow color and audio if playing
      if (isPlaying) {
        updateGlowColor(preset.glowColor);
        startPresetCrossfade();
      }

      // Persist preset and update URL
      storage.savePreset(preset.slug);
      if (!skipUrlUpdate) {
        const url = new URL(window.location.href);
        url.searchParams.set('preset', preset.slug);
        history.replaceState(null, '', url.toString());
      }
    }

    // ─── Persistence ──────────────────────────────────────────
    // Graceful fallback when localStorage is unavailable (private browsing, etc.)
    const storage = (() => {
      const PRESET_KEY = 'noise.dog:preset';
      const VOLUME_KEY = 'noise.dog:volume';
      let available = false;
      try {
        localStorage.setItem('__test__', '1');
        localStorage.removeItem('__test__');
        available = true;
      } catch (e) { /* storage unavailable */ }

      return {
        savePreset(slug) {
          if (!available) return;
          try { localStorage.setItem(PRESET_KEY, slug); } catch (e) {}
        },
        saveVolume(val) {
          if (!available) return;
          try { localStorage.setItem(VOLUME_KEY, String(val)); } catch (e) {}
        },
        loadPreset() {
          if (!available) return null;
          try { return localStorage.getItem(PRESET_KEY); } catch (e) { return null; }
        },
        loadVolume() {
          if (!available) return null;
          try {
            const v = localStorage.getItem(VOLUME_KEY);
            if (v === null) return null;
            const n = parseInt(v, 10);
            return isNaN(n) ? null : Math.max(0, Math.min(100, n));
          } catch (e) { return null; }
        },
      };
    })();

    // ─── Volume ───────────────────────────────────────────────
    const volumeSlider = document.getElementById('volume');

    function setVolume(val, persist = false) {
      targetVolume = val / 100;
      if (masterGain) masterGain.gain.value = targetVolume;
      volumeSlider.value = val;
      volumeSlider.style.setProperty('--vol-pct', val + '%');
      document.documentElement.style.setProperty('--vol-pct', val + '%');
      if (persist) storage.saveVolume(val);
    }

    volumeSlider.addEventListener('input', (e) => {
      setVolume(parseInt(e.target.value, 10), true);
    });

    // ─── Build preset buttons ─────────────────────────────────
    const presetSelector = document.getElementById('presetSelector');

    PRESETS.forEach((preset, i) => {
      const btn = document.createElement('button');
      btn.className = 'preset-btn' + (i === 0 ? ' active' : '');
      btn.type = 'button';
      btn.textContent = preset.name;
      btn.setAttribute('aria-pressed', String(i === 0));
      btn.setAttribute('aria-label', preset.name);
      btn.addEventListener('click', () => selectPreset(i));
      presetSelector.appendChild(btn);
    });

    // ─── Play button ──────────────────────────────────────────
    playBtn.addEventListener('click', togglePlay);

    // ─── Keyboard shortcuts ───────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.target !== document.body && e.target !== document.documentElement) return;

      if (e.code === 'Space') {
        e.preventDefault();
        togglePlay();
      } else if (e.code === 'ArrowLeft') {
        e.preventDefault();
        const prev = (currentPresetIndex - 1 + PRESETS.length) % PRESETS.length;
        selectPreset(prev);
      } else if (e.code === 'ArrowRight') {
        e.preventDefault();
        const next = (currentPresetIndex + 1) % PRESETS.length;
        selectPreset(next);
      }
    });

    // ─── Init: URL → localStorage → default ──────────────────
    // Priority: URL param > localStorage > default (Deep Focus, vol 50)
    (function initFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const urlSlug = params.get('preset');

      // Resolve starting preset
      const resolvedSlug = urlSlug || storage.loadPreset();
      if (resolvedSlug) {
        const idx = PRESETS.findIndex(p => p.slug === resolvedSlug);
        if (idx > 0) {
          currentPresetIndex = idx;
          const buttons = document.querySelectorAll('.preset-btn');
          buttons.forEach((btn, i) => {
            btn.classList.toggle('active', i === idx);
            btn.setAttribute('aria-pressed', String(i === idx));
          });
          presetNameEl.textContent = PRESETS[idx].name;
          // Sync URL to resolved preset (handles localStorage→URL)
          if (!urlSlug) {
            const url = new URL(window.location.href);
            url.searchParams.set('preset', PRESETS[idx].slug);
            history.replaceState(null, '', url.toString());
          }
        }
      }

      // Restore volume (or default to 50)
      const savedVol = storage.loadVolume();
      setVolume(savedVol !== null ? savedVol : 50);
    })();
  </script>
</body>
</html>
