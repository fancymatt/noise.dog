<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>noise.dog</title>
  <link rel="icon" type="image/x-icon" href="images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <style>
    /* ─── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; }
    body { line-height: 1.5; -webkit-font-smoothing: antialiased; }
    img, picture, video, canvas, svg { display: block; max-width: 100%; }
    input, button, textarea, select { font: inherit; }
    p, h1, h2, h3, h4, h5, h6 { overflow-wrap: break-word; }

    /* ─── Tokens ─────────────────────────────────────────────── */
    :root {
      --color-bg:               #1c1917;
      --color-surface:          #292421;
      --color-text-primary:     #e8e0d8;
      --color-text-secondary:   #9c8f84;
      --color-accent:           #c8a96e;
      --color-preset-active-text:   #1c1917;
      --color-preset-inactive-text: #9c8f84;
      --glow-color:             200, 169, 110;
      --vol-pct:                50%;
    }

    /* ─── Base ───────────────────────────────────────────────── */
    html, body {
      height: 100%;
      background-color: var(--color-bg);
      color: var(--color-text-primary);
      font-family: 'Inter', sans-serif;
    }

    /* ─── Screen reader utility ──────────────────────────────── */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border-width: 0;
    }

    /* ─── Focus styles ───────────────────────────────────────── */
    :focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 3px;
      border-radius: 4px;
    }
    .preset-btn:focus-visible {
      outline-offset: 2px;
      border-radius: 20px;
    }
    .play-btn:focus-visible {
      border-radius: 50%;
    }

    /* ─── Background glow ────────────────────────────────────── */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(
        ellipse at center,
        rgba(var(--glow-color), 0) 0%,
        transparent 70%
      );
      opacity: 0;
      transition: opacity 1.5s ease;
    }
    .bg-glow.playing {
      animation: breathe 10s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.7; }
      50%       { opacity: 1; }
    }

    /* ─── Layout ─────────────────────────────────────────────── */
    .layout {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: max(20px, env(safe-area-inset-top));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      padding-left: 24px;
      padding-right: 24px;
    }

    /* ─── Brand ──────────────────────────────────────────────── */
    .brand {
      width: 100%;
      font-size: 13px;
      font-weight: 400;
      color: var(--color-text-secondary);
      text-align: center;
      letter-spacing: 0.01em;
      flex-shrink: 0;
    }

    /* ─── Spacers ────────────────────────────────────────────── */
    .spacer { flex: 1; }
    .spacer-sm { height: 20px; flex-shrink: 0; }
    .spacer-md { height: 32px; flex-shrink: 0; }
    .spacer-lg { height: 48px; flex-shrink: 0; }

    /* ─── Preset name ────────────────────────────────────────── */
    .preset-name {
      font-size: 30px;
      font-weight: 300;
      color: var(--color-text-primary);
      text-align: center;
      line-height: 1.2;
      transition: font-weight 600ms ease;
    }
    .preset-name.playing {
      font-weight: 400;
    }

    /* ─── Preset selector ────────────────────────────────────── */
    .preset-selector {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .preset-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      background: transparent;
      color: var(--color-preset-inactive-text);
      font-size: 12px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 150ms ease, color 150ms ease, transform 120ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    .preset-btn:hover {
      background: rgba(200, 169, 110, 0.08);
      color: var(--color-text-primary);
    }
    .preset-btn.active {
      background: var(--color-accent);
      color: var(--color-preset-active-text);
    }
    .preset-btn:active {
      transform: scale(0.96);
    }

    /* ─── Play button ────────────────────────────────────────── */
    .play-btn {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 1.5px solid var(--color-text-primary);
      background: transparent;
      color: var(--color-text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 160ms cubic-bezier(0.34, 1.56, 0.64, 1);
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .play-btn:active {
      transform: scale(0.94);
    }
    .play-btn svg {
      width: 32px;
      height: 32px;
    }
    .icon-play, .icon-pause {
      transition: opacity 100ms ease;
    }

    /* ─── Volume slider ──────────────────────────────────────── */
    .volume-label {
      display: block;
      width: calc(100% - 48px);
    }

    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 44px; /* tall for touch target */
      background: transparent;
      cursor: pointer;
      padding: 0;
      margin: 0;
    }

    /* Track */
    .volume-slider::-webkit-slider-runnable-track {
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(
        to right,
        var(--color-accent) 0%,
        var(--color-accent) var(--vol-pct),
        #2a2420 var(--vol-pct),
        #2a2420 100%
      );
    }
    .volume-slider::-moz-range-track {
      height: 3px;
      border-radius: 2px;
      background: #2a2420;
    }
    .volume-slider::-moz-range-progress {
      height: 3px;
      border-radius: 2px;
      background: var(--color-accent);
    }

    /* Thumb */
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--color-text-primary);
      margin-top: -6.5px;
      transition: transform 100ms ease;
    }
    .volume-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: none;
      background: var(--color-text-primary);
      transition: transform 100ms ease;
    }
    .volume-slider:active::-webkit-slider-thumb {
      transform: scale(1.2);
    }
    .volume-slider:active::-moz-range-thumb {
      transform: scale(1.2);
    }

    /* ─── Desktop ────────────────────────────────────────────── */
    @media (min-width: 900px) {
      .layout {
        max-width: 480px;
        margin: 0 auto;
      }
      .brand {
        text-align: left;
      }
      .play-btn {
        width: 120px;
        height: 120px;
      }
      .play-btn svg {
        width: 40px;
        height: 40px;
      }
      .volume-label {
        width: 320px;
      }
    }
  </style>
</head>
<body>

  <div class="bg-glow" id="bgGlow" aria-hidden="true"></div>

  <div class="layout">
    <header class="brand" aria-label="noise.dog">noise.dog</header>

    <div class="spacer"></div>

    <p class="preset-name" id="presetName" aria-live="polite">Deep Focus</p>
    <div class="spacer-sm"></div>
    <div class="preset-selector" role="group" aria-label="Sound presets" id="presetSelector"></div>

    <div class="spacer"></div>

    <button
      class="play-btn"
      id="playBtn"
      aria-label="Play"
      aria-pressed="false"
      type="button"
    >
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g class="icon-play" id="iconPlay">
          <polygon points="11,6 27,16 11,26" fill="currentColor"/>
        </g>
        <g class="icon-pause" id="iconPause" style="display:none; opacity:0">
          <rect x="7" y="6" width="5" height="20" rx="1" fill="currentColor"/>
          <rect x="20" y="6" width="5" height="20" rx="1" fill="currentColor"/>
        </g>
      </svg>
    </button>

    <div class="spacer-lg"></div>

    <label class="volume-label" for="volume">
      <span class="sr-only">Volume</span>
      <input
        type="range"
        id="volume"
        class="volume-slider"
        min="0"
        max="100"
        value="50"
        aria-label="Volume"
      >
    </label>

    <div class="spacer"></div>
  </div>

  <script>
    // ─── Presets ──────────────────────────────────────────────
    const PRESETS = [
      { name: "Deep Focus",    slug: "deep-focus",    glowColor: "200, 169, 110", audio: "brown" },
      { name: "Midnight Rain", slug: "midnight-rain", glowColor: "110, 130, 155", audio: "brown" },
      { name: "Embers",        slug: "embers",        glowColor: "210, 135, 75",  audio: "brown" },
      { name: "Coastal Wind",  slug: "coastal-wind",  glowColor: "130, 160, 150", audio: "brown" },
      { name: "Drift",         slug: "drift",         glowColor: "160, 155, 180", audio: "brown" },
    ];

    let currentPresetIndex = 0;
    let isPlaying = false;
    let ctx, gainNode, noiseNode;

    // ─── Audio engine ─────────────────────────────────────────
    function createAudioContext() {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      gainNode = ctx.createGain();
      gainNode.gain.value = 0.5;
      gainNode.connect(ctx.destination);
    }

    function whiteNoise() {
      const bufferSize = 2 * ctx.sampleRate;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      source.loop = true;
      return source;
    }

    function brownNoise() {
      const bufferSize = 2 * ctx.sampleRate;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      let last = 0;
      for (let i = 0; i < bufferSize; i++) {
        const white = Math.random() * 2 - 1;
        data[i] = (last + 0.02 * white) / 1.02;
        last = data[i];
        data[i] *= 3.5;
      }
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      source.loop = true;
      return source;
    }

    function createNoiseNode(audioType) {
      return audioType === 'white' ? whiteNoise() : brownNoise();
    }

    function startNoise() {
      if (!ctx) createAudioContext();
      stopNoise();
      const preset = PRESETS[currentPresetIndex];
      noiseNode = createNoiseNode(preset.audio);
      noiseNode.connect(gainNode);
      noiseNode.start();
    }

    function stopNoise() {
      if (noiseNode) {
        noiseNode.stop();
        noiseNode.disconnect();
        noiseNode = null;
      }
    }

    // ─── Glow system ──────────────────────────────────────────
    const bgGlow = document.getElementById('bgGlow');

    function showGlow() {
      const preset = PRESETS[currentPresetIndex];
      bgGlow.style.background = `radial-gradient(ellipse at center, rgba(${preset.glowColor}, 0.08) 0%, transparent 70%)`;
      // Fade in over 2.5s, then breathing animation takes over
      bgGlow.style.transition = 'opacity 2.5s ease';
      bgGlow.style.opacity = '1';
      bgGlow.classList.add('playing');
    }

    function hideGlow() {
      bgGlow.classList.remove('playing');
      bgGlow.style.transition = 'opacity 1.5s ease';
      bgGlow.style.opacity = '0';
    }

    function updateGlowColor(glowColor) {
      // Smooth color crossfade over 800ms
      const currentOpacity = parseFloat(bgGlow.style.opacity) || 0;
      bgGlow.style.transition = 'none';
      bgGlow.style.background = `radial-gradient(ellipse at center, rgba(${glowColor}, 0.08) 0%, transparent 70%)`;
      // Restore transition after background update
      requestAnimationFrame(() => {
        bgGlow.style.transition = 'opacity 1.5s ease';
      });
    }

    // ─── Play icon morph ──────────────────────────────────────
    const iconPlay  = document.getElementById('iconPlay');
    const iconPause = document.getElementById('iconPause');

    function updatePlayIcon(playing) {
      if (playing) {
        iconPlay.style.opacity = '0';
        setTimeout(() => {
          iconPlay.style.display = 'none';
          iconPause.style.display = 'block';
          iconPause.style.opacity = '0';
          requestAnimationFrame(() => { iconPause.style.opacity = '1'; });
        }, 100);
      } else {
        iconPause.style.opacity = '0';
        setTimeout(() => {
          iconPause.style.display = 'none';
          iconPlay.style.display = 'block';
          iconPlay.style.opacity = '0';
          requestAnimationFrame(() => { iconPlay.style.opacity = '1'; });
        }, 100);
      }
    }

    // ─── Toggle play ──────────────────────────────────────────
    const playBtn    = document.getElementById('playBtn');
    const presetNameEl = document.getElementById('presetName');

    function togglePlay() {
      isPlaying = !isPlaying;
      playBtn.setAttribute('aria-pressed', String(isPlaying));
      playBtn.setAttribute('aria-label', isPlaying ? 'Pause' : 'Play');
      updatePlayIcon(isPlaying);

      if (isPlaying) {
        if (ctx?.state === 'suspended') ctx.resume();
        startNoise();
        showGlow();
        presetNameEl.classList.add('playing');
      } else {
        stopNoise();
        hideGlow();
        presetNameEl.classList.remove('playing');
      }
    }

    // ─── Preset name transition ───────────────────────────────
    function transitionPresetName(newName) {
      presetNameEl.style.transition = 'opacity 200ms ease, transform 200ms ease';
      presetNameEl.style.opacity = '0';
      presetNameEl.style.transform = 'translateY(-4px)';

      setTimeout(() => {
        presetNameEl.textContent = newName;
        presetNameEl.style.transform = 'translateY(4px)';
        requestAnimationFrame(() => {
          presetNameEl.style.opacity = '1';
          presetNameEl.style.transform = 'translateY(0)';
        });
      }, 100);
    }

    // ─── Select preset ────────────────────────────────────────
    function selectPreset(index, skipUrlUpdate) {
      if (index === currentPresetIndex) return;

      const prev = currentPresetIndex;
      currentPresetIndex = index;
      const preset = PRESETS[index];

      // Update capsules
      const buttons = document.querySelectorAll('.preset-btn');
      buttons.forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
        btn.setAttribute('aria-pressed', String(i === index));
      });

      // Update preset name with transition
      transitionPresetName(preset.name);

      // Update glow color if playing
      if (isPlaying) {
        updateGlowColor(preset.glowColor);
        // Restart noise with new preset audio type
        startNoise();
      }

      // Update URL
      if (!skipUrlUpdate) {
        const url = new URL(window.location.href);
        url.searchParams.set('preset', preset.slug);
        history.replaceState(null, '', url.toString());
      }
    }

    // ─── Volume ───────────────────────────────────────────────
    const volumeSlider = document.getElementById('volume');

    function setVolume(val) {
      if (gainNode) gainNode.gain.value = val / 100;
      volumeSlider.style.setProperty('--vol-pct', val + '%');
      document.documentElement.style.setProperty('--vol-pct', val + '%');
    }

    volumeSlider.addEventListener('input', (e) => {
      setVolume(parseInt(e.target.value, 10));
    });

    // ─── Build preset buttons ─────────────────────────────────
    const presetSelector = document.getElementById('presetSelector');

    PRESETS.forEach((preset, i) => {
      const btn = document.createElement('button');
      btn.className = 'preset-btn' + (i === 0 ? ' active' : '');
      btn.type = 'button';
      btn.textContent = preset.name;
      btn.setAttribute('aria-pressed', String(i === 0));
      btn.setAttribute('aria-label', preset.name);
      btn.addEventListener('click', () => selectPreset(i));
      presetSelector.appendChild(btn);
    });

    // ─── Play button ──────────────────────────────────────────
    playBtn.addEventListener('click', togglePlay);

    // ─── Keyboard shortcuts ───────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.target !== document.body && e.target !== document.documentElement) return;

      if (e.code === 'Space') {
        e.preventDefault();
        togglePlay();
      } else if (e.code === 'ArrowLeft') {
        e.preventDefault();
        const prev = (currentPresetIndex - 1 + PRESETS.length) % PRESETS.length;
        selectPreset(prev);
      } else if (e.code === 'ArrowRight') {
        e.preventDefault();
        const next = (currentPresetIndex + 1) % PRESETS.length;
        selectPreset(next);
      }
    });

    // ─── Init from URL ────────────────────────────────────────
    (function initFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('preset');
      if (slug) {
        const idx = PRESETS.findIndex(p => p.slug === slug);
        if (idx > 0) {
          currentPresetIndex = idx;
          const buttons = document.querySelectorAll('.preset-btn');
          buttons.forEach((btn, i) => {
            btn.classList.toggle('active', i === idx);
            btn.setAttribute('aria-pressed', String(i === idx));
          });
          presetNameEl.textContent = PRESETS[idx].name;
        }
      }
      // Set initial volume track fill
      setVolume(50);
    })();
  </script>
</body>
</html>
